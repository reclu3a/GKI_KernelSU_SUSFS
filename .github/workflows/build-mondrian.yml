name: Build Mondrian Kernel (SukiSU + SUSFS)

permissions:
  contents: write

on:
  workflow_dispatch:

env:
  CLANG_PATH: "${{ github.workspace }}/kernel-build-tools/linux-x86/clang/bin"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc flex bison libssl-dev libelf-dev \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Download AOSP build tools
        run: |
          AOSP_MIRROR=https://android.googlesource.com
          BRANCH=main-kernel-build-2024
          git clone "$AOSP_MIRROR/kernel/prebuilts/build-tools" -b "$BRANCH" --depth 1 kernel-build-tools
          git clone "$AOSP_MIRROR/platform/system/tools/mkbootimg" -b "$BRANCH" --depth 1 mkbootimg

      - name: Clone Baalam kernel source (CLO-based, works on mondrian)
        run: |
          git clone --depth=1 \
            https://github.com/LowTension/android_kernel_xiaomi_sm8475.git kernel

      - name: Merge SukiSU into kernel
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main

      - name: Get SUSFS patches
        run: |
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git susfs
          cd kernel
          cp -r ../susfs/kernel_patches/5.10/fs/susfs.c fs/ 2>/dev/null || true
          cp -r ../susfs/kernel_patches/5.10/include/linux/susfs.h include/linux/ 2>/dev/null || true

      - name: Checkout config
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Apply device config and fixes
        run: |
          cd kernel
          cp ../repo/mondrian_defconfig .config

          # Fix missing dirs if needed
          mkdir -p drivers/misc/hwid drivers/misc/plaid 2>/dev/null
          [ ! -f drivers/misc/hwid/Kconfig ] && echo '# stub' > drivers/misc/hwid/Kconfig && echo '# empty' > drivers/misc/hwid/Makefile
          [ ! -f drivers/misc/plaid/Kconfig ] && echo '# stub' > drivers/misc/plaid/Kconfig && echo '# empty' > drivers/misc/plaid/Makefile

          # Configure
          scripts/config --disable CONFIG_TRIM_UNUSED_KSYMS
          scripts/config --enable CONFIG_KSU
          scripts/config --enable CONFIG_KSU_SUSFS
          # Disable Android vendor hooks (missing from open source)
          scripts/config --disable CONFIG_ANDROID_VENDOR_HOOKS
          scripts/config --set-val CONFIG_ANDROID_VENDOR_OEM_DATA 0

      - name: Build kernel
        run: |
          cd kernel
          export PATH="${{ github.workspace }}/kernel-build-tools/linux-x86/clang/bin:$PATH"
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang HOSTCC=gcc olddefconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang HOSTCC=gcc -j"$(nproc)" Image 2>&1

      - name: Upload kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: mondrian-kernel-susfs
          path: kernel/arch/arm64/boot/Image
